<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jet Slalom — Remastered</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Canvas fills viewport, centered via JS absolute positioning */
  #game-canvas {
    position: fixed;
    display: block;
    cursor: pointer;
    outline: none;
  }

  /* HUD bar overlaid at top of canvas */
  #hud {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
    color: #d0ffd0;
    font-size: clamp(11px, 1.4vw, 16px);
    padding: 5px 16px;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }
  #hud span { white-space: nowrap; }
  #score-display, #hiscore-display {
    font-weight: bold;
    color: #ffffff;
  }

  /* Game-over overlay */
  #game-over-overlay {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    z-index: 20;
  }
  #game-over-panel {
    background: rgba(20, 20, 20, 0.88);
    backdrop-filter: blur(8px);
    border: 1px solid #444;
    border-radius: 3px;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 260px;
  }
  #game-over-panel h2 {
    color: #fff;
    font-family: 'Times New Roman', serif;
    font-size: clamp(18px, 2.5vw, 28px);
    margin-bottom: 4px;
    text-align: center;
  }
  .modern-btn {
    display: block;
    width: 100%;
    padding: 8px 16px;
    font-family: 'Courier New', monospace;
    font-size: clamp(12px, 1.2vw, 15px);
    background: #1a6b3a;
    color: #fff;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s;
  }
  .modern-btn:hover:not(:disabled) { background: #247d48; }
  .modern-btn:active:not(:disabled) { background: #0f5228; }
  .modern-btn:disabled { background: #333; color: #666; cursor: default; }
  #send-record-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #send-record-row .modern-btn { flex: 0 0 auto; width: auto; padding: 8px 14px; }
  #player-name {
    flex: 1;
    font-family: 'Courier New', monospace;
    font-size: clamp(12px, 1.2vw, 15px);
    background: #111;
    border: 1px solid #555;
    border-radius: 2px;
    padding: 7px 10px;
    color: #fff;
    outline: none;
  }
  #player-name:focus { border-color: #1a6b3a; }

  /* Focus-lost overlay — dims the scene and shows a subtle nudge */
  #focus-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 15;
    pointer-events: none;
    align-items: center;
    justify-content: center;
  }
  #focus-overlay.visible {
    display: flex;
  }
  #focus-nudge {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255, 255, 255, 0.75);
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(13px, 1.6vw, 18px);
    letter-spacing: 0.05em;
    animation: focusPulse 2s ease-in-out infinite;
  }
  #focus-nudge svg {
    opacity: 0.85;
  }
  @keyframes focusPulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1;   }
  }

  /* Touch controls */
  #touch-controls {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    gap: 24px;
    z-index: 10;
  }
  .touch-btn {
    width: 100px;
    height: 60px;
    font-size: 28px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    text-align: center;
    line-height: 60px;
    touch-action: none;
    cursor: pointer;
  }
  .touch-btn:active { background: rgba(255,255,255,0.3); }
  @media (pointer: coarse) {
    #touch-controls { display: flex; }
  }

  /* Panel credit — mirrors game's "Programed by MR-C" style */
  .panel-credit {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(9px, 0.9vw, 11px);
    color: #555;
    text-align: center;
    margin-top: -6px;
  }

</style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <span>Score: <span id="score-display">000000</span></span>
    <span>Hi-score: <span id="hiscore-display">0</span></span>
  </div>

  <div id="game-over-overlay">
    <div id="game-over-panel">
      <h2>Game Over</h2>
      <div class="panel-credit">Remaster 2024 by Tyler Straub</div>
      <button id="play-again-btn" class="modern-btn">Play Again</button>
      <div id="send-record-row">
        <button id="send-record-btn" class="modern-btn">Send Record</button>
        <input type="text" id="player-name" placeholder="Your name" maxlength="16">
      </div>
    </div>
  </div>

  <div id="focus-overlay">
    <div id="focus-nudge">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
        <path d="M7 3.5 L14 9 L7 14.5 Z"/>
      </svg>
      Click to resume
    </div>
  </div>

  <div id="touch-controls">
    <div class="touch-btn" id="touch-left">&#9664;</div>
    <div class="touch-btn" id="touch-right">&#9654;</div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
